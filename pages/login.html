<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Faça login na Pentabyte store</title>
    <link rel="shortcut icon" href="../images/icons/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style_login.css">
    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
</head>

<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="../index.html">
                    <img src="../images/icons/logo.png" alt="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li> <a href="../index.html" class="lnk.menu"> Home </a> </li>
                    <li><a href="login.html" class="lnk.menu"> Entrar </a></li>
                    <li> <a href="sobre.html" class="lnk.menu"> Sobre </a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li> <a href="cadastro.html" class="lnk.icone"> <img src="../images/icons/login.png"
                                alt="Login de usuario"> </a></li>
                    <li> <a href="carrinho.html" class="lnk.icone"> <img src="../images/icons/carrinho.png"
                                alt="Carrinho de compras"> </a></li>
                </ul>
            </div>

            <section id="pesquisa">
                <input type="text" name="pesquisa" id="pesquisa" placeholder="Encontre na Penta">
            </section>

        </header>

        <section id="formulario-login">
            <form id="form-login">
                <h1> Bem-vindo(a) de volta! </h1>
                <p> Olá! Se você já comprou na loja da PentabyteShop antes, por favor, informe seu e-mail e senha. </p>

                <label for="cpf"> CPF </label>
                <input type="number" name="cpf" id="cpf" class="input02" maxlength="24" required
                    placeholder="Informe o CPF">

                <label for="senha"> Senha </label>
                <input type="password" name="senha" id="senha" class="input02" required maxlength="6"
                    placeholder="Digite uma senha de 6 números">


                <div id="div-btns">
                    <button type="submit" id="submit"> Fazer Login </button>
                    <button type="button"> <a href="cadastro.html"> Fazer Cadastro </a> </button>
                </div>
            </form>


            <div id="image">
                <a href="../index.html?secao=2"> <img src="../images/produtos/banner-placa-de-video-promo.png" alt="nada"
                        class="image-login"> </a>
            </div>

        </section>


        <footer id="rodape">
            <div id="dados-loja">
                <h2> Rua Com Nome bem Family Friendly</h2>
                <h1> Aracaju - Sergipe </h1>
            </div>

            <div id="icones_sociais">
                <ul>
                    <li> <a href="instagram.com/velkro_o"> <img src="../images/icons/instagram.png" alt=""> </a></li>
                    <li><a href="x.com/__2345meia78"> <img src="../images/icons/x.png"> </a> </li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../images/icons/master_card.png" alt="mastercard">
                <img src="../images/icons/hipercard.png" alt="hipercard">
                <img src="../images/icons/visa.png" alt="visa">
            </div>
        </footer>
    </main>
</body>

</html>
