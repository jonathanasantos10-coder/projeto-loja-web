<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentabyte store</title>
    <link rel="shortcut icon" href="../images/icons/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style_formulario.css">
    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
</head>

<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="../index.html">
                    <img src="../images/icons/logo.png" alt="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li> <a href="../index.html" class="lnk.menu"> Home </a> </li>
                    <li><a href="login.html" class="lnk.menu"> Entrar </a></li>
                    <li> <a href="sobre.html" class="lnk.menu"> Sobre </a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li> <a href="login.html" class="lnk.icone"> <img src="../images/icons/login.png"
                                alt="Login de usuario"> </a></li>
                    <li> <a href="carrinho.html" class="lnk.icone"> <img src="../images/icons/carrinho.png"
                                alt="Carrinho de compras"> </a></li>
                </ul>
            </div>

            <section id="pesquisa">
                <input type="text" name="pesquisa" id="pesquisa" placeholder="Encontre na Penta">
            </section>


        </header>

        <section id="formulario">
            <form id="form-pessoa">
                <h3> Cadastro de usuário </h3>

                <label for="nome"> Nome </label>
                <input type="text" name="nome" id="nome" class="input01" maxlength="5" required>

                <label for="cpf"> CPF </label>
                <input type="number" name="cpf" id="cpf" class="input02" maxlength="24" required
                    placeholder="Informe o CPF">

                <label for="bday"> Data de nascimento </label>
                <input type="date" name="bday" id="bday" class="input02" required>

                <label for="sexo"> Sexo </label>
                <input type="radio" name="sexo" id="sexoF" class="inputOP" required value="F"> Feminino
                <input type="radio" name="sexo" id="sexoM" class="inputOP" required value="M"> Masculino
                <input type="radio" name="sexo" id="sexoN" class="inputOP" required value="N" checked> Não declarar


                <label for="cep"> CEP </label>
                <input type="text" name="cep" id="cep" class="input02" maxlength="9" required
                    placeholder="Informe o seu CEP">

                <div id="div-dados-endereco" class="oculto">
                    <label for="logradouro"> Logradouro </label>
                    <input type="text" name="logradouro" id="logradouro" class="input01">

                    <label for="num-residencia"> Número </label>
                    <input type="text" name="numeroR" id="numeroR" class="input02" maxlength="10"
                        placeholder="Digite o número da sua residência">

                    <label for="complemento-end"> Compelemento </label>
                    <input type="text" name="complemento-end" id="complemento-end" class="input01" maxlength="100">

                    <label for="bairro"> Bairro</label>
                    <input type="text" name="bairro" id="bairro" class="input01">

                    <label for="localidade"> localidade</label>
                    <input type="text" name="localidade" id="localidade" class="input01">

                    <label for="uf"> UF </label>
                    <input type="text" name="uf" id="uf" class="input02">
                </div>

                <label for="senha"> Senha </label>
                <input type="password" name="senha" id="senha" class="input02" required maxlength="6"
                    placeholder="Digite uma senha de 6 números">


                <div id="div-btns">
                    <button type="submit" id="submit"> Criar Conta </button>
                    <button type="button"> <a href="login.html"> Fazer login (Entrar) </a> </button>
                </div>

            </form>
        </section>


        <footer id="rodape">
            <div id="dados-loja">
                <h2> Rua Com Nome bem Family Friendly</h2>
                <h1> Aracaju - Sergipe </h1>
            </div>

            <div id="icones_sociais">
                <ul>
                    <li> <a href="instagram.com/velkro_o"> <img src="../images/icons/instagram.png" alt=""> </a></li>
                    <li><a href="x.com/__2345meia78"> <img src="../images/icons/x.png"> </a> </li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../images/icons/master_card.png" alt="mastercard">
                <img src="../images/icons/hipercard.png" alt="hipercard">
                <img src="../images/icons/visa.png" alt="visa">
            </div>
        </footer>
    </main>
</body>

</html>
