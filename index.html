<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentabyte store</title>
    <link rel="shortcut icon" href="images/icons/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style_estrutura_paginas.css">
    <script src="js/carrega_produtos.js" defer type="module"> </script>
</head>

<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo">
                <a href="index.html">
                    <img src="images/icons/logo.png" alt="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li> <a href="index.html" class="lnk_menu"> Home </a> </li>
                    <li><a href="pages/login.html" class="lnk_menu"> Entrar </a></li>
                    <li> <a href="pages/sobre.html" class="lnk_menu"> Sobre </a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li> <a href="pages/cadastro.html" class="lnk.icone"> <img src="images/icons/login.png"
                                alt="Login de usuario"> </a></li>
                    <li> <a href="pages/carrinho.html" class="lnk.icone"> <img src="images/icons/carrinho.png"
                                alt="Carrinho de compras"> </a></li>
                </ul>
            </div>

            <section id="pesquisa">
                <input type="text" name="pesquisa" id="pesquisa" placeholder="Encontre na Penta">
            </section>



        </header>

        <nav id="menu-secoes">
            <ul id="lista-secoes">
                <li><button id="btn-todos" class="ativo" data-secao="todos">Todos</button></li>
            </ul>
        </nav>


        <section id="cards">
            <div class="card">

            </div>

        </section>

        <footer id="rodape">
            <div id="dados-loja">
                <h2> Rua Com Nome bem Family Friendly</h2>
                <h1> Aracaju - Sergipe </h1>
            </div>

            <div id="icones_sociais">
                <ul>
                    <li> <a href="instagram.com/velkro_o"> <img src="images/icons/instagram.png" alt=""> </a></li>
                    <li><a href="x.com/__2345meia78"> <img src="images/icons/x.png"> </a> </li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="images/icons/master_card.png" alt="mastercard">
                <img src="images/icons/hipercard.png" alt="hipercard">
                <img src="images/icons/visa.png" alt="visa">
            </div>
        </footer>
    </main>
</body>

</html>
